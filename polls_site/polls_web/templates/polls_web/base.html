<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="stylesheet" href="style.css">
	<title>{% block title %}Polls{% endblock %}</title>
</head>

<body>
	<nav>
		<a href="{% url 'polls_web:index' %}">Home</a>
		{% if user.is_authenticated %}
		{% comment %} <a href="{% url 'polls_web:new' %}">New Poll</a> {% endcomment %}
		<form method="post" action="{% url 'polls_web:logout' %}">
			{% csrf_token %}
			<button type="submit">Log out</button>
		</form>
		{% else %}
		<a href="{% url 'polls_web:login' %}">Log in</a>
		{% endif %}
	</nav>

	<div id="content">
		{% block content %}{% endblock %}
	</div>
	{% block scripts %}{% endblock scripts %}
</body>
</html>
